<!-- Close button -->
<div class="flex justify-end px-4 pt-4">
  <button type="button" (click)="onNoClick()" class="p-1.5 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-gray-600">
    <i class="bi bi-x-lg text-sm"></i>
  </button>
</div>

<!-- Body -->
<div class="flex flex-col items-center px-8 pb-6 pt-2 text-center">
  <!-- Icon -->
  <div class="bg-red-100 rounded-full p-4 mb-4">
    <i class="bi bi-exclamation-triangle-fill text-red-500 text-3xl"></i>
  </div>

  <!-- Heading -->
  <h2 class="text-lg font-bold text-gray-800 mb-2">{{ data?.heading || 'Are you sure?' }}</h2>

  <!-- Message -->
  <p class="text-sm text-gray-500 leading-relaxed mb-1">
    {{ data?.msg }}
    <ng-container *ngIf="data?.name">
      <strong class="text-gray-700">"{{ data?.name }}"</strong>?
    </ng-container>
  </p>
  <span class="text-xs text-red-400 font-medium">This action cannot be undone.</span>
</div>

<!-- Footer -->
<div class="flex justify-center gap-3 px-6 py-4 border-t border-gray-100">
  <button
    type="button"
    (click)="onNoClick()"
    class="px-6 py-2.5 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition text-sm font-medium"
  >Cancel</button>
  <button
    [mat-dialog-close]="'delete'"
    class="px-6 py-2.5 bg-red-600 text-white rounded-xl hover:bg-red-700 active:bg-red-800 transition text-sm font-semibold shadow-sm"
  >Delete</button>
</div>
