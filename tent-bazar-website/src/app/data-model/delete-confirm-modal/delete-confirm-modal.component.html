<!-- Header -->
<div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
  <div class="flex items-center gap-2">
    <div class="bg-red-100 p-2 rounded-xl">
      <i class="bi bi-exclamation-triangle text-red-500 text-base"></i>
    </div>
    <h2 class="text-base font-semibold text-gray-800">{{ data?.heading }}</h2>
  </div>
  <button type="button" (click)="onNoClick()" class="p-1.5 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-gray-600">
    <i class="bi bi-x-lg text-sm"></i>
  </button>
</div>

<!-- Body -->
<div class="px-6 py-6 text-center">
  <p class="text-sm text-gray-500 leading-relaxed">
    {{ data?.msg }} <strong class="text-gray-800">"{{ data?.name }}"</strong>?<br />
    <span class="text-xs text-gray-400 mt-1 block">This action cannot be undone.</span>
  </p>
</div>

<!-- Footer -->
<div class="flex justify-center gap-3 px-6 py-4 border-t border-gray-100 bg-white">
  <button
    type="button"
    (click)="onNoClick()"
    class="px-5 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition text-sm font-medium"
  >Cancel</button>
  <button
    [mat-dialog-close]="'delete'"
    class="px-5 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 transition text-sm font-medium"
  >Delete</button>
</div>
