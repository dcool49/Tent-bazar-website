<div class="p-6 text-center relative">
  <button type="button" (click)="onNoClick()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
  <div class="flex justify-center mb-4">
    <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </div>
  </div>

  <h3 class="text-lg font-semibold mb-2 text-gray-800">{{data?.heading}}</h3>
  <p class="mb-6 text-gray-500 text-sm">{{data?.msg}} <strong class="text-gray-700">"{{data?.name}}"</strong>?</p>

  <div class="flex justify-center gap-3">
    <button
      (click)="onNoClick()"
      class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition text-sm"
    >Cancel</button>
    <button
      [mat-dialog-close]="'delete'"
      class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition text-sm"
    >Delete</button>
  </div>
</div>
