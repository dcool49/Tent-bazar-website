
<div class="flex h-screen">
  <!-- Mobile overlay -->
  <div *ngIf="isSidebarOpen" class="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden" (click)="toggleSidebar()"></div>

  <!-- Left Sidebar Tabs -->
  <div class="w-64 bg-gray-900 text-white flex-col fixed inset-y-0 left-0 z-50 h-full overflow-y-auto"
       [ngClass]="isSidebarOpen ? 'flex' : 'hidden md:flex'">
    <!-- Header -->
    <div class="p-6 border-b border-gray-700">
      <p class="text-2xl font-bold">{{ isAdmin ? 'Admin Panel' : 'My Panel' }}</p>
      <p class="text-xs text-gray-400 mt-1 capitalize">{{ role }}</p>
    </div>

    <!-- Tab Menu -->
    <nav class="flex-1 mt-4 space-y-2">
      <button *ngFor="let tab of tabs; let i = index" (click)="setTab(i);urlRout(tab.route);isSidebarOpen=false"
        class="flex items-center gap-3 w-full px-4 py-2 text-left rounded-md transition" [ngClass]="
          activeTab === i
            ? 'bg-gray-800 text-green-400 font-semibold'
            : 'hover:bg-gray-800 hover:text-green-300'
        ">
        <i [class]="tab.icon + ' text-lg w-5 text-center'"></i>
        <span>{{ tab.label }}</span>
      </button>
    </nav>
  </div>

  <!-- Right Content -->
  <div class="flex-1 bg-white md:ml-64 overflow-y-auto h-screen">
    <app-admin-top-nav (sidebarToggle)="toggleSidebar()"></app-admin-top-nav>
    <!-- Tab Content -->
    <div class="p-6">
      <router-outlet ></router-outlet>
