<div class="p-6">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-xl font-bold text-gray-800">Add YouTube URL</h2>
    <button type="button" (click)="onNoClick()" class="text-gray-400 hover:text-gray-600 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <form>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">YouTube URL</label>
      <input
        [(ngModel)]="youtubeUrl"
        name="youtube"
        type="url"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
        placeholder="https://www.youtube.com/..."
      />
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button
        type="button"
        (click)="onNoClick()"
        class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition text-sm"
      >Cancel</button>
      <button
        type="button"
        (click)="saveClick()"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm"
      >Save</button>
    </div>
  </form>
</div>
