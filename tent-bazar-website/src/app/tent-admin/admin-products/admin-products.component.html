<div class="p-6 bg-gray-50 min-h-screen">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 gap-4">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Product Management</h2>
      <p class="text-sm text-gray-500 mt-0.5">{{ productList?.length || 0 }} products total</p>
    </div>

    <div class="flex flex-col sm:flex-row sm:items-center gap-2 w-full sm:w-auto">
      <!-- Search -->
      <div class="relative w-full sm:w-64">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <input
          type="text"
          placeholder="Search products..."
          [(ngModel)]="searchName"
          (input)="getProductList()"
          class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400"
        />
      </div>

      <!-- Category Filter -->
      <select
        class="w-full sm:w-44 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400"
        [(ngModel)]="value"
        (change)="filterByCat()"
      >
        <option value="">All Categories</option>
        <option *ngFor="let cat of category" [value]="cat._id">{{ cat.categoryName }}</option>
      </select>

      <!-- Add Product -->
      <button
        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium flex items-center gap-2 whitespace-nowrap transition-colors"
        (click)="openAddDialog()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add Product
      </button>
    </div>
  </div>

  <!-- Product Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-200 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">
            <th class="px-4 py-3">#</th>
            <th class="px-4 py-3">Image</th>
            <th class="px-4 py-3">Product Name</th>
            <th class="px-4 py-3">Category</th>
            <th class="px-4 py-3">Price</th>
            <th class="px-4 py-3">Added Date</th>
            <th class="px-4 py-3 text-center">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr
            *ngFor="let prod of productList | paginate: { itemsPerPage: itemsPerPage, currentPage: p }; let i = index"
            class="hover:bg-gray-50 transition-colors"
          >
            <td class="px-4 py-3 text-sm text-gray-500">{{ i + 1 + (p - 1) * itemsPerPage }}</td>
            <td class="px-4 py-3">
              <img
                [src]="prod.image?.[0]?.img_name"
                class="w-12 h-12 object-cover rounded-lg border border-gray-200"
                alt="Product image"
              />
            </td>
            <td class="px-4 py-3">
              <span class="text-sm font-medium text-gray-800">{{ prod.productName }}</span>
            </td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 text-xs rounded-full bg-blue-50 text-blue-700 font-medium">{{ getcatName(prod.category_id) }}</span>
            </td>
            <td class="px-4 py-3 text-sm font-semibold text-gray-800">Rs {{ prod.price }}</td>
            <td class="px-4 py-3 text-sm text-gray-500">{{ prod.createdAt | date:'dd MMM yyyy' }}</td>
            <td class="px-4 py-3">
              <div class="flex items-center justify-center gap-1">
                <!-- View -->
                <button
                  (click)="openViewDialog(prod)"
                  title="View"
                  class="p-1.5 rounded-lg text-blue-600 hover:bg-blue-50 transition-colors"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  </svg>
                </button>
                <!-- Edit -->
                <button
                  (click)="openEditDialog(prod)"
                  title="Edit"
                  class="p-1.5 rounded-lg text-yellow-600 hover:bg-yellow-50 transition-colors"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5m-1.414-9.414a2 2 0 1 1 2.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                  </svg>
                </button>
                <!-- Delete -->
                <button
                  (click)="openDialog(prod)"
                  title="Delete"
                  class="p-1.5 rounded-lg text-red-500 hover:bg-red-50 transition-colors"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v3M4 7h16"/>
                  </svg>
                </button>
              </div>
            </td>
          </tr>

          <!-- Empty State -->
          <tr *ngIf="!productList?.length">
            <td colspan="7" class="px-4 py-16 text-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7m16 0v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-5m16 0H4"/>
              </svg>
              <p class="text-gray-400 text-sm">No products found</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="px-4 py-3 border-t border-gray-100 flex justify-end">
      <pagination-controls (pageChange)="pageChanged($event)"></pagination-controls>
    </div>
  </div>
</div>
