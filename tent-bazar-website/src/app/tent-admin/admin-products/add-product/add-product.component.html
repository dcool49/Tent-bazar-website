<!-- Header -->
<div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
  <div class="flex items-center gap-2">
    <div class="bg-green-100 p-2 rounded-xl">
      <i class="bi bi-box-seam text-green-600 text-base"></i>
    </div>
    <h2 class="text-base font-semibold text-gray-800">{{ data.edit ? 'Edit Product' : 'Add Product' }}</h2>
  </div>
  <button type="button" (click)="onNoClick()" class="p-1.5 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-gray-600">
    <i class="bi bi-x-lg text-sm"></i>
  </button>
</div>

<!-- Scrollable Body -->
<div class="px-6 py-5 overflow-y-auto" style="max-height: 62vh">
  <form [formGroup]="myForm" (ngSubmit)="uploadFile()" class="space-y-4">

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
        Images
      </label>
      <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-gray-200 rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
        <i class="bi bi-cloud-upload text-2xl text-gray-300 mb-1"></i>
        <span class="text-xs text-gray-400">Click to upload images</span>
        <input type="file" class="hidden" (change)="onFileSelected($event)" />
      </label>
      <div class="flex flex-wrap gap-2 mt-3">
        <div *ngFor="let imgPreview of previewUrl; let i = index" class="relative w-20 h-20">
          <img [src]="imgPreview" class="w-20 h-20 object-cover rounded-xl border border-gray-200" />
          <button type="button" (click)="removeImage(i)"
            class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center hover:bg-red-600 text-xs shadow">
            <i class="bi bi-x"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
          Product Name <span class="text-red-500">*</span>
        </label>
        <input formControlName="productName" type="text" placeholder="Enter product name"
          [ngClass]="{ 'border-red-500 focus:ring-red-400': submitted && myForm.get('productName')?.invalid }"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-green-400 focus:outline-none focus:bg-white transition" />
        <p *ngIf="submitted && myForm.get('productName')?.invalid" class="text-red-500 text-xs mt-1">Product name is required.</p>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
          Category <span class="text-red-500">*</span>
        </label>
        <select formControlName="category_id"
          [ngClass]="{ 'border-red-500 focus:ring-red-400': submitted && myForm.get('category_id')?.invalid }"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-green-400 focus:outline-none focus:bg-white transition">
          <option value="">Select category</option>
          <option *ngFor="let cat of category" [value]="cat._id">{{ cat.categoryName }}</option>
        </select>
        <p *ngIf="submitted && myForm.get('category_id')?.invalid" class="text-red-500 text-xs mt-1">Category is required.</p>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
          Price (₹) <span class="text-red-500">*</span>
        </label>
        <input formControlName="price" type="number" placeholder="0"
          [ngClass]="{ 'border-red-500 focus:ring-red-400': submitted && myForm.get('price')?.invalid }"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-green-400 focus:outline-none focus:bg-white transition" />
        <p *ngIf="submitted && myForm.get('price')?.invalid" class="text-red-500 text-xs mt-1">Price is required.</p>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
          Selling Price (₹) <span class="text-red-500">*</span>
        </label>
        <input formControlName="product_selling_price" type="number" placeholder="0"
          [ngClass]="{ 'border-red-500 focus:ring-red-400': submitted && myForm.get('product_selling_price')?.invalid }"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-green-400 focus:outline-none focus:bg-white transition" />
        <p *ngIf="submitted && myForm.get('product_selling_price')?.invalid" class="text-red-500 text-xs mt-1">Selling price is required.</p>
      </div>
      <div class="col-span-2">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
          Discount Price (₹) <span class="text-red-500">*</span>
        </label>
        <input formControlName="product_discount_price" type="number" placeholder="0"
          [ngClass]="{ 'border-red-500 focus:ring-red-400': submitted && myForm.get('product_discount_price')?.invalid }"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-green-400 focus:outline-none focus:bg-white transition" />
        <p *ngIf="submitted && myForm.get('product_discount_price')?.invalid" class="text-red-500 text-xs mt-1">Discount price is required.</p>
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
        Summary <span class="text-red-500">*</span>
      </label>
      <textarea formControlName="summery" rows="3" placeholder="Enter product summary"
        [ngClass]="{ 'border-red-500 focus:ring-red-400': submitted && myForm.get('summery')?.invalid }"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-green-400 focus:outline-none focus:bg-white transition resize-none">
      </textarea>
      <p *ngIf="submitted && myForm.get('summery')?.invalid" class="text-red-500 text-xs mt-1">Summary is required.</p>
    </div>

  </form>
</div>

<!-- Footer -->
<div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100 bg-white">
  <button type="button" (click)="onNoClick()"
    class="px-5 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition text-sm font-medium">
    Cancel
  </button>
  <button type="button" (click)="uploadFile()"
    class="px-5 py-2 bg-green-600 text-white rounded-xl hover:bg-green-700 transition text-sm font-medium">
    <i class="bi bi-check-lg mr-1"></i>{{ data.edit ? 'Update' : 'Save' }}
  </button>
</div>
