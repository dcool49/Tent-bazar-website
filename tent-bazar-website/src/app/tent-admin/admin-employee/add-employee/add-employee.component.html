<div class="p-6">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-xl font-bold text-gray-800">{{ data.edit ? 'Edit Employee' : 'Add Employee' }}</h2>
    <button type="button" (click)="onNoClick()" class="text-gray-400 hover:text-gray-600 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <form [formGroup]="myForm" (ngSubmit)="saveClick()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
      <input
        formControlName="name"
        type="text"
        placeholder="Enter full name"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
      <input
        formControlName="mobile"
        type="number"
        placeholder="Enter mobile number"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
      <select
        formControlName="role"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
      >
        <option value="">Select role</option>
        <option value="employee">Employee</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <div class="flex gap-2">
        <input
          formControlName="password"
          type="text"
          placeholder="Enter password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
        />
        <button
          type="button"
          (click)="generateRandomPassword()"
          class="px-3 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition text-sm whitespace-nowrap"
        >Auto</button>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button
        type="button"
        (click)="onNoClick()"
        class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition text-sm"
      >Cancel</button>
      <button
        type="submit"
        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm"
      >{{ data.edit ? 'Update' : 'Submit' }}</button>
    </div>
  </form>
</div>
