<div class="p-6 bg-white rounded-xl w-full max-w-lg">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-xl font-bold text-gray-800">Employee Details</h2>
    <button type="button" (click)="close()" class="text-gray-400 hover:text-gray-600 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <div class="space-y-4">
    <div class="flex justify-between border-b pb-2">
      <span class="font-medium text-gray-600">Name</span>
      <span class="text-gray-800">{{data.name}}</span>
    </div>

    <div class="flex justify-between border-b pb-2">
      <span class="font-medium text-gray-600">Mobile</span>
      <span class="text-gray-800">{{data.mobile}}</span>
    </div>

    <div class="flex justify-between border-b pb-2">
      <span class="font-medium text-gray-600">Role</span>
      <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm capitalize">{{data.role}}</span>
    </div>


  </div>

  <div class="flex justify-center mt-8">
    <button (click)="close()" class="px-5 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition">
      Close
    </button>
  </div>
</div>
