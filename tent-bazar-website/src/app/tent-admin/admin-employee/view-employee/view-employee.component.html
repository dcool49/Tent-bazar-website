<!-- Header -->
<div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
  <div class="flex items-center gap-2">
    <div class="bg-blue-100 p-2 rounded-xl">
      <i class="bi bi-person-circle text-blue-600 text-base"></i>
    </div>
    <h2 class="text-base font-semibold text-gray-800">Employee Details</h2>
  </div>
  <button type="button" (click)="close()" class="p-1.5 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-gray-600">
    <i class="bi bi-x-lg text-sm"></i>
  </button>
</div>

<!-- Body -->
<div class="px-6 py-5 overflow-y-auto" style="max-height: 60vh">
  <div class="space-y-3">

    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
      <i class="bi bi-person text-gray-400 text-lg"></i>
      <div>
        <p class="text-xs text-gray-400 uppercase tracking-wide">Name</p>
        <p class="text-sm font-medium text-gray-800 mt-0.5">{{ data.name }}</p>
      </div>
    </div>

    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
      <i class="bi bi-telephone text-gray-400 text-lg"></i>
      <div>
        <p class="text-xs text-gray-400 uppercase tracking-wide">Mobile</p>
        <p class="text-sm font-medium text-gray-800 mt-0.5">{{ data.mobile }}</p>
      </div>
    </div>

    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
      <i class="bi bi-shield text-gray-400 text-lg"></i>
      <div>
        <p class="text-xs text-gray-400 uppercase tracking-wide">Role</p>
        <span class="mt-0.5 inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold capitalize">
          {{ data.role }}
        </span>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<div class="flex justify-end px-6 py-4 border-t border-gray-100 bg-white">
  <button type="button" (click)="close()"
    class="px-5 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition text-sm font-medium">
    Close
  </button>
</div>
