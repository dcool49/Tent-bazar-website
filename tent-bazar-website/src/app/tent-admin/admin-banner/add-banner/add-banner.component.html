<div class="p-6">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-xl font-bold text-gray-800">{{ data.edit ? 'Edit Banner' : 'Add New Banner' }}</h2>
    <button type="button" (click)="onNoClick()" class="text-gray-400 hover:text-gray-600 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <form [formGroup]="myForm" (ngSubmit)="uploadFile()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Image Upload</label>
      <input
        class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
        type="file"
        (change)="onFileSelected($event)"
      />
      <div *ngIf="previewUrl" class="mt-2 relative w-32 h-32">
        <img [src]="previewUrl" class="w-32 h-32 object-cover rounded-lg border" />
        <button
          type="button"
          (click)="removeImage()"
          class="absolute top-0 right-0 bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center hover:bg-red-700 text-sm"
        >&times;</button>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Banner Name</label>
      <input
        type="text"
        name="bannerName"
        formControlName="bannerName"
        placeholder="Enter banner name"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Rank</label>
      <input
        type="number"
        name="rank"
        formControlName="rank"
        placeholder="Enter rank"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button
        type="button"
        (click)="onNoClick()"
        class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition text-sm"
      >Cancel</button>
      <button
        type="submit"
        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm"
      >Save</button>
    </div>
  </form>
</div>
