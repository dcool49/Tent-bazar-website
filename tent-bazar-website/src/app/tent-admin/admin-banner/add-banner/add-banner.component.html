<!-- Header -->
<div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
  <div class="flex items-center gap-2">
    <div class="bg-indigo-100 p-2 rounded-xl">
      <i class="bi bi-image text-indigo-600 text-base"></i>
    </div>
    <h2 class="text-base font-semibold text-gray-800">{{ data.edit ? 'Edit Banner' : 'Add New Banner' }}</h2>
  </div>
  <button type="button" (click)="onNoClick()" class="p-1.5 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-gray-600">
    <i class="bi bi-x-lg text-sm"></i>
  </button>
</div>

<!-- Scrollable Body -->
<div class="px-6 py-5 overflow-y-auto" style="max-height: 60vh">
  <form [formGroup]="myForm" (ngSubmit)="uploadFile()" class="space-y-4">

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Image Upload</label>
      <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-gray-200 rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
        <i class="bi bi-cloud-upload text-2xl text-gray-300 mb-1"></i>
        <span class="text-xs text-gray-400">Click to upload image</span>
        <input type="file" class="hidden" (change)="onFileSelected($event)" />
      </label>
      <div *ngIf="previewUrl" class="mt-3 relative inline-block">
        <img [src]="previewUrl" class="w-28 h-28 object-cover rounded-xl border border-gray-200" />
        <button type="button" (click)="removeImage()"
          class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center hover:bg-red-600 text-xs shadow">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Banner Name</label>
      <input type="text" name="bannerName" formControlName="bannerName" placeholder="Enter banner name"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-indigo-400 focus:outline-none focus:bg-white transition" />
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Rank</label>
      <input type="number" name="rank" formControlName="rank" placeholder="Enter rank"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-indigo-400 focus:outline-none focus:bg-white transition" />
    </div>

  </form>
</div>

<!-- Footer -->
<div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100 bg-white">
  <button type="button" (click)="onNoClick()"
    class="px-5 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition text-sm font-medium">
    Cancel
  </button>
  <button type="button" (click)="uploadFile()"
    class="px-5 py-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition text-sm font-medium">
    <i class="bi bi-check-lg mr-1"></i>Save
  </button>
</div>
