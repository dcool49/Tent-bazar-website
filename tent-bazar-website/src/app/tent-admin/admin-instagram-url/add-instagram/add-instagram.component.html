<!-- Header -->
<div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
  <div class="flex items-center gap-2">
    <div class="bg-pink-100 p-2 rounded-xl">
      <i class="bi bi-instagram text-pink-600 text-base"></i>
    </div>
    <h2 class="text-base font-semibold text-gray-800">Add Instagram URL</h2>
  </div>
  <button type="button" (click)="onNoClick()" class="p-1.5 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-gray-600">
    <i class="bi bi-x-lg text-sm"></i>
  </button>
</div>

<!-- Body -->
<div class="px-6 py-5">
  <form>
    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Instagram URL</label>
    <input
      [(ngModel)]="InstaGramUrl"
      name="instagram"
      type="url"
      class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-700 bg-gray-50 focus:ring-2 focus:ring-pink-400 focus:outline-none focus:bg-white transition"
      placeholder="https://www.instagram.com/..."
    />
  </form>
</div>

<!-- Footer -->
<div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100 bg-white">
  <button type="button" (click)="onNoClick()"
    class="px-5 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition text-sm font-medium">
    Cancel
  </button>
  <button type="button" (click)="saveClick()"
    class="px-5 py-2 bg-pink-600 text-white rounded-xl hover:bg-pink-700 transition text-sm font-medium">
    <i class="bi bi-check-lg mr-1"></i>Save
  </button>
</div>
