<div class="flex items-center justify-between px-6 pt-6 pb-2">
  <h2 class="text-xl font-bold text-gray-800">{{ data.edit ? 'Edit User' : 'Add User' }}</h2>
  <button type="button" (click)="onNoClick()" class="text-gray-400 hover:text-gray-600 transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>

<mat-dialog-content class="mat-typography !px-6">
  <form [formGroup]="myForm" (ngSubmit)="saveClick()" class="space-y-4">
    <div>
      <label class="block text-gray-700 font-medium mb-1">Full Name</label>
      <input
        formControlName="name"
        name="name"
        type="text"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Mobile Number</label>
      <input
        formControlName="mobile"
        name="mobile"
        type="number"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Password</label>
      <div class="flex gap-2">
        <input
          formControlName="password"
          name="password"
          type="text"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        />
        <button type="button" class="px-3 py-2 bg-orange-600 text-white rounded-lg whitespace-nowrap" (click)="generateRandomPassword()">Auto</button>
      </div>
    </div>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Company Name</label>
      <input
        formControlName="companyName"
        name="companyName"
        type="text"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <p class="font-medium text-gray-700">Address</p>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Address Line</label>
      <input
        formControlName="addressLine"
        name="addressLine"
        type="text"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700 font-medium mb-1">City</label>
        <input
          formControlName="city"
          name="city"
          type="text"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        />
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-1">State</label>
        <input
          formControlName="state"
          name="state"
          type="text"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        />
      </div>
    </div>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Pin Code</label>
      <input
        formControlName="pinCode"
        name="pinCode"
        type="number"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="px-6 pb-4 gap-2">
  <button
    type="button"
    class="px-5 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition"
    (click)="onNoClick()"
  >
    Cancel
  </button>
  <button
    type="button"
    (click)="saveClick()"
    class="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition"
  >
    {{ data.edit ? 'Update' : 'Submit' }}
  </button>
</mat-dialog-actions>
