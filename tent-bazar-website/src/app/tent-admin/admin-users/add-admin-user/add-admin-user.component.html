<!-- Header -->
<div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
  <div class="flex items-center gap-2">
    <div class="bg-blue-100 p-2 rounded-xl">
      <i class="bi bi-person-plus text-blue-600 text-base"></i>
    </div>
    <h2 class="text-base font-semibold text-gray-800">{{ data.edit ? 'Edit User' : 'Add User' }}</h2>
  </div>
  <button type="button" (click)="onNoClick()" class="p-1.5 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-gray-600">
    <i class="bi bi-x-lg text-sm"></i>
  </button>
</div>

<!-- Scrollable Body -->
<div class="px-6 py-5 overflow-y-auto" style="max-height: 60vh">
  <form [formGroup]="myForm" (ngSubmit)="saveClick()" class="space-y-4">

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Full Name</label>
      <input formControlName="name" name="name" type="text"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Mobile Number</label>
      <input formControlName="mobile" name="mobile" type="number"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Password</label>
      <div class="flex gap-2">
        <input formControlName="password" name="password" type="text"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
        <button type="button" (click)="generateRandomPassword()"
          class="px-4 py-2 bg-orange-500 text-white rounded-xl hover:bg-orange-600 transition text-sm whitespace-nowrap font-medium">
          Auto
        </button>
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Company Name</label>
      <input formControlName="companyName" name="companyName" type="text"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
    </div>

    <div class="pt-1">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Address</p>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Address Line</label>
          <input formControlName="addressLine" name="addressLine" type="text"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1">City</label>
            <input formControlName="city" name="city" type="text"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1">State</label>
            <input formControlName="state" name="state" type="text"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Pin Code</label>
          <input formControlName="pinCode" name="pinCode" type="number"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none focus:bg-white transition" />
        </div>
      </div>
    </div>

  </form>
</div>

<!-- Footer -->
<div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100 bg-white">
  <button type="button" (click)="onNoClick()"
    class="px-5 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition text-sm font-medium">
    Cancel
  </button>
  <button type="button" (click)="saveClick()"
    class="px-5 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition text-sm font-medium">
    <i class="bi bi-check-lg mr-1"></i>{{ data.edit ? 'Update' : 'Submit' }}
  </button>
</div>
