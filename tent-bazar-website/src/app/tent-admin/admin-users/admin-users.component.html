<div class="p-4 md:p-6 bg-gray-100 min-h-screen">
  <div class="flex flex-col gap-3 mb-6 sm:flex-row sm:items-center sm:justify-between">
    <h2 class="text-2xl font-bold">User List</h2>
    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:gap-3">
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (ngModelChange)="p = 1"
        placeholder="Search by name, mobile, city, email..."
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-full sm:w-72 focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
      <button (click)="exportToCSV()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm flex items-center justify-center gap-2 whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 8l-3-3m3 3l3-3" />
        </svg>
        Export CSV
      </button>
      <button (click)="openDialog(false,null)" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm flex items-center justify-center gap-2 whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add User
      </button>
    </div>
  </div>

  <div class="overflow-x-auto bg-white rounded-xl shadow">
    <table class="w-full border-collapse min-w-[600px]">
      <thead>
        <tr class="bg-gray-100 text-left">
          <th class="p-3">#</th>
          <th class="p-3">Name</th>
          <th class="p-3">Mobile</th>
          <th class="p-3 hidden md:table-cell">City</th>
          <th class="p-3 hidden lg:table-cell">Email</th>
          <th class="p-3 hidden md:table-cell">Joined Date</th>
          <th class="p-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="
          let user of filteredList
            | paginate : { itemsPerPage: itemsPerPage, currentPage: p };
          let i = index
        " class="border-b hover:bg-gray-50">
          <td class="p-3 text-sm">{{ i + 1 + (p - 1) * itemsPerPage }}</td>
          <td class="p-3">
            <div class="font-medium text-sm">{{user.name}}</div>
            <div class="text-xs text-gray-500 md:hidden">{{user.mobile}}</div>
          </td>
          <td class="p-3 text-sm hidden sm:table-cell">{{user.mobile}}</td>
          <td class="p-3 text-sm hidden md:table-cell">{{user.city}}</td>
          <td class="p-3 text-sm hidden lg:table-cell">{{user.email}}</td>
          <td class="p-3 text-sm hidden md:table-cell">{{user.createdAt | date}}</td>
          <td class="p-3">
            <div class="flex gap-2 flex-wrap">
              <button (click)="viewUserReport(user)" class="px-2 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-xs sm:text-sm sm:px-3">Report</button>
              <button (click)="openDeleteDialog(user)" class="px-2 py-1 bg-red-500 text-white rounded hover:bg-red-600 text-xs sm:text-sm sm:px-3">Remove</button>
              <button (click)="openDialog(true, user)" class="px-2 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600 text-xs sm:text-sm sm:px-3">Edit</button>
            </div>
          </td>
        </tr>




   
      </tbody>
    </table>
    <br />
    <pagination-controls
      (pageChange)="pageChanged($event)"
    ></pagination-controls>
  </div>
</div>
