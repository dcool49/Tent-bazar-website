


<!-- Main Header -->
<header class="bg-white shadow-md fixed w-full top-0 z-40">
  <!-- Top Bar (Hidden on Mobile) -->
<div class="bg-[#000] text-white text-sm py-3 px-4 top-0 w-full z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    
    <!-- Left Side (Contact Info) -->
    <div class="flex space-x-6">
      <a href="tel:9279974675" class="flex items-center space-x-1 hover:text-gray-200">
        <span class="text-orange"><i class="bi bi-telephone-fill"></i></span>
        <span class="hidden sm:inline">9279974675</span>
      </a>

      <a href="mailto:info@adtentbazar.com" class="flex items-center space-x-1 hover:text-gray-200">
        <span class="text-orange"><i class="bi bi-envelope-fill"></i></span>
        <span class="hidden sm:inline">info&#64;adtentbazar.com</span>
      </a>

      <a href="https://wa.me/9279974675" target="_blank" class="flex items-center space-x-1 hover:text-gray-200">
        <span class="text-orange"><i class="bi bi-whatsapp"></i></span>
        <span class="hidden sm:inline">Chat on WhatsApp</span>
      </a>
    </div>

    <!-- Right Side (Search + Cart) -->
    <div class="flex items-center space-x-4">
      <!-- Search -->
      <form action="search.html" method="GET" class="flex items-center bg-white rounded-md overflow-hidden">
        <input
          type="text"
          name="q"
          placeholder="Search..."
          [(ngModel)]="searchName"
          class="px-2 py-1 text-sm text-black focus:outline-none w-40">
        <button
          type="submit"
          (click)="searchProd()"
          class="bg-[#ff6600] text-white px-2 py-1 flex items-center border border-[#ff6600]">
          <i class="bi bi-search"></i>
        </button>
      </form>

      <!-- Cart -->
      <a (click)="urlRout('cart')" class="relative flex items-center hover:text-gray-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.3 5.2a1 1 0 001 1.3h12a1 1 0 001-1.3L17 13M7 13h10M9 21a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z" />
        </svg>
        <span class="absolute -top-2 -right-2 bg-white text-[#c7085c] text-xs font-bold rounded-full px-1.5">{{cartCount}}</span>
      </a>
    </div>
  </div>
</div>

  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- Logo -->
      <a routerLink="/home" class="flex items-center">
        <img src="./../../../assets/images/logo.svg" alt="Logo" class="h-12 w-auto" />
        <span class="logo-text">Aditya Agency & Tent Bazar</span>
      </a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center space-x-6">
        <a routerLink="/home" (click)="urlRout('home')" routerLinkActive="font-bold text-blue-600">Home</a>
        <a routerLink="/about-us" (click)="urlRout('about-us')" routerLinkActive="font-bold text-blue-600">About Us</a>
        <a routerLink="/contact" (click)="urlRout('contact')" routerLinkActive="font-bold text-blue-600">Contact Us</a>
        <a (click)="urlRout('catogery')" class="text-gray-900 hover:text-blue-600">Catogery</a>
        <a (click)="searchempty()" class="text-gray-900 hover:text-blue-600 cursor-pointer">Products</a>
        <a (click)="urlRout('mobile-app')" class="text-gray-900 hover:text-blue-600">mobile App</a>

        <!-- User logged-in links -->
        <ng-container *ngIf="isUserLoggedIn">
          <a routerLink="/my-orders"
            class="flex items-center gap-1.5 text-gray-900 hover:text-orange-500 font-medium transition">
            <i class="bi bi-bag-check"></i> My Orders
          </a>

          <!-- Profile dropdown -->
          <div class="relative group">
            <button class="flex items-center justify-center w-9 h-9 bg-orange-500 text-white rounded-full font-bold text-sm shadow hover:bg-orange-600 transition">
              {{ userInitial }}
            </button>
            <div class="absolute right-0 top-full mt-2 w-44 bg-white border border-gray-100 rounded-xl shadow-xl
                        opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
              <a routerLink="/my-profile"
                class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-orange-50 rounded-t-xl transition">
                <i class="bi bi-person-circle text-orange-500"></i> Profile
              </a>
              <div class="border-t border-gray-100"></div>
              <a (click)="logoutUser()"
                class="flex items-center gap-2 px-4 py-3 text-sm text-red-600 hover:bg-red-50 rounded-b-xl cursor-pointer transition">
                <i class="bi bi-box-arrow-right"></i> Logout
              </a>
            </div>
          </div>
        </ng-container>
      </div>

      <!-- Mobile Hamburger -->
      <div class="md:hidden flex items-center">
        <button (click)="toggleMenu()" class="text-gray-900 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen" class="md:hidden flex flex-col space-y-3 mt-4 bg-gray-50 p-4 rounded-lg shadow">
      <a routerLink="/home" (click)="closeMenu()" class="text-gray-900 hover:text-blue-600">Home</a>
      <a routerLink="/about-us" (click)="closeMenu()" class="text-gray-900 hover:text-blue-600">About Us</a>
      <a href="https://play.google.com/store/apps/details?id=com.dapps.tentbazaar&hl=en_IN" target="_blank"
        class="text-gray-900 hover:text-blue-600">Rate This App</a>
      <a href="#" class="text-gray-900 hover:text-blue-600">Share on Social</a>
      <a href="https://itemscatalogue.redcross.int/upload/products_data/files/HSHETENT07.pdf" target="_blank"
        class="text-gray-900 hover:text-blue-600">Brochure</a>
      <a href="#" class="text-gray-900 hover:text-blue-600">Certificates</a>

      <!-- User logged-in links for mobile -->
      <ng-container *ngIf="isUserLoggedIn">
        <div class="border-t border-gray-200 pt-3 mt-1 flex flex-col space-y-3">
          <a routerLink="/my-orders" (click)="closeMenu()"
            class="flex items-center gap-2 text-gray-900 hover:text-orange-500 font-medium">
            <i class="bi bi-bag-check text-orange-500"></i> My Orders
          </a>
          <a routerLink="/my-profile" (click)="closeMenu()"
            class="flex items-center gap-2 text-gray-900 hover:text-orange-500 font-medium">
            <i class="bi bi-person-circle text-orange-500"></i> My Profile
          </a>
          <a (click)="logoutUser()"
            class="flex items-center gap-2 text-red-600 hover:text-red-700 font-medium cursor-pointer">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </div>
      </ng-container>
    </div>
  </nav>
</header>
